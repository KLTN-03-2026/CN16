version: '3.9'

services:

  minio:
    image: minio/minio:RELEASE.2025-06-13T11-33-47Z
    ports:
      - "9000:9000" # MinIO S3 API port
      - "9001:9001" # MinIO Console port
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"

  mysql:
    image: mysql:9.5.0
    restart: no
    ports:
      - 3306:3306
    expose:
      - 3306
    environment:
      MYSQL_ROOT_PASSWORD: r00t
      MYSQL_PASSWORD: r00t
      MYSQL_DATABASE: pawn
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-pr00t"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  pawn-service-be:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      mysql:
        condition: service_healthy
      minio:
        condition: service_started
    restart: always
    ports:
      - "${BE_PORT}:8080"
    environment:
#      - SPRING_PROFILES_ACTIVE=mysql
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql:3306/pawn?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=r00t
      - AWS_S3_ENDPOINT=http://minio:9000

  redis:
    image: redis:latest
    container_name: redis-server
    ports:
      - "6379:6379"
    command: redis-server --requirepass ${REDIS_PASSWORD:-myredispassword}
    environment:
      - REDIS_PASSWORD=${REDIS_PASSWORD:-myredispassword}

volumes:
  minio_data:
    driver: local